<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Audio Event Detection</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .card {
        background: #ffffff;
        padding: 30px 40px;
        border-radius: 10px;
        width: 380px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        text-align: center;
    }

    h2 {
        margin-top: 0;
        margin-bottom: 20px;
        color: #1e3c72;
    }

    input[type="file"] {
        width: 100%;
        margin-bottom: 20px;
    }

    button {
        background-color: #1e3c72;
        color: white;
        border: none;
        padding: 10px 18px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 15px;
    }

    button:hover {
        background-color: #16325c;
    }

    .result {
        margin-top: 20px;
        padding: 10px;
        background: #f2f6ff;
        border-radius: 5px;
        color: #333;
    }

    .footer {
        margin-top: 15px;
        font-size: 12px;
        color: #777;
    }
</style>
</head>

<body>

<div class="card">

    <h2>Audio Event Detection</h2>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="audio" accept=".wav" required>
        <br>
        <button type="submit">Upload & Detect</button>
    </form>

    {% if prediction %}
    <div class="result">
        <strong>Result:</strong><br>
        {{ prediction }}
    </div>
    {% endif %}

    <div class="footer">
        ESC-50 based sound classifier
    </div>

</div>

</body>
</html>
